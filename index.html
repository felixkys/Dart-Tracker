    <style>
        :root { --font-sans: 'Outfit', ui-sans-serif, system-ui, sans-serif; }
        html, body { background-color: #020617; font-family: var(--font-sans); margin: 0; color-scheme: dark; }

        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // ==========================================
        // GLOBAL CONSTANTS & HELPERS
        // ==========================================
        const DB_NAME = 'DartTrackerDB_HTML';
        const STORE_NAME = 'appState';
        const appContainerClasses = "app-container";
        const playerColors = ['#3b82f6', '#f59e0b', '#ec4899', '#8b5cf6'];
        const wedgeAngles = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];

        const getDefaultStats = () => ({
            totalDarts: 0, totalScore: 0, first9Score: 0, first9Darts: 0, checkoutAttempts: 0, checkouts: 0
        });

        // ==========================================
        // 1. STATE MANAGEMENT
        // ==========================================
        let state = {
            isDbLoaded: false,
            view: 'SETUP',
            appMode: 'STANDARD',
            gameMode: 501,
            outMode: 'Double',
            matchFormat: 'LEGS',
            targetLegs: 1,
            targetSets: 1,
            isFormatExpanded: false,
            players: [],
            rounds: [],
            leagueMatches: [],
            currentRoundIndex: 0,
            activeGame: null,
            currentDarts: [],
            inputMultiplier: 1,
            errorMsg: '',
            starterMode: 'SELECT',
            isCoinFlipping: false,
            coinWinner: null,
            bullOff: { order: [], currentTurn: 0, hits: {}, winner: null, isTie: false },
            turnNotification: null,
            boardZoom: 1
        };

        const dbHelper = {
            init: () => new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            }),
            save: async (data) => {
                try {
                    const db = await dbHelper.init();
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).put(data, 'mainState');
                } catch (err) {}
            },
            load: async () => {
                try {
                    const db = await dbHelper.init();
                    return new Promise((resolve) => {
                        const tx = db.transaction(STORE_NAME, 'readonly');
                        const req = tx.objectStore(STORE_NAME).get('mainState');
                        req.onsuccess = () => resolve(req.result);
                        req.onerror = () => resolve(null);
                    });
                } catch (err) { return null; }
            }
        };

        function setState(updates) {
            state = { ...state, ...updates };
            
            const { isDbLoaded, errorMsg, currentDarts, inputMultiplier, isCoinFlipping, turnNotification, boardZoom, ...persistentState } = state;
            if (state.isDbLoaded) dbHelper.save(persistentState);
            
            render();
        }

        // ==========================================
        // 2. INITIALIZATION
        // ==========================================
        async function initApp() {
            const savedState = await dbHelper.load();
            if (savedState) {
                state = { ...state, ...savedState, isDbLoaded: true, currentDarts: [], inputMultiplier: 1, turnNotification: null, boardZoom: 1 };
            } else {
                state.isDbLoaded = true;
            }
            render();
        }

        // ==========================================
        // 3. LOGIC & UTILITIES
        // ==========================================
        const playSound = (type) => {
            try { new Audio(type === '180' ? '/180.mp3' : '/bust.mp3').play().catch(()=>{}); } catch (e) {}
        };

        const formatDart = (d) => {
            if (d.base === 0) return 'Vorbei';
            if (d.base === 25 && d.multiplier === 1) return '25';
            if (d.base === 25 && d.multiplier === 2) return '50';
            if (d.multiplier === 1) return `${d.base}`;
            if (d.multiplier === 2) return `D${d.base}`;
            if (d.multiplier === 3) return `T${d.base}`;
            return `${d.base}`;
        };

        const getWedgePath = (r) => {
            const x = 50 + r * Math.sin(18 * Math.PI / 180);
            const y = 50 - r * Math.cos(18 * Math.PI / 180);
            return `M 50 50 L 50 ${50-r} A ${r} ${r} 0 0 1 ${x} ${y} Z`;
        };

        const getCheckoutSuggestion = (score, mode) => {
            if (score > 170 || score < 2) return null;
            if (mode === 'Double' && [169, 168, 166, 165, 163, 162, 159].includes(score)) return null;
            if (mode === 'Single') {
                if (score <= 60 && (score <= 20 || score === 25 || score === 50 || score % 2 === 0 || score % 3 === 0)) return 'Finish';
                return null; 
            }
            if (score <= 40) {
                if (score % 2 === 0) return `D${score / 2}`;
                const toLeave16 = score - 32;
                if (toLeave16 > 0 && toLeave16 <= 20) return `${toLeave16} ➔ D16`;
                const toLeave8 = score - 16;
                if (toLeave8 > 0 && toLeave8 <= 20) return `${toLeave8} ➔ D8`;
                return `1 ➔ D${(score - 1) / 2}`;
            }

            const standardCheckouts = {
                170: 'T20 ➔ T20 ➔ Bull', 167: 'T20 ➔ T19 ➔ Bull', 164: 'T20 ➔ T18 ➔ Bull', 161: 'T20 ➔ T17 ➔ Bull',
                160: 'T20 ➔ T20 ➔ D20', 158: 'T20 ➔ T20 ➔ D19', 157: 'T20 ➔ T19 ➔ D20', 156: 'T20 ➔ T20 ➔ D18',
                155: 'T20 ➔ T19 ➔ D19', 154: 'T20 ➔ T18 ➔ D20', 153: 'T20 ➔ T19 ➔ D18', 152: 'T20 ➔ T20 ➔ D16',
                151: 'T20 ➔ T17 ➔ D20', 150: 'T20 ➔ T18 ➔ D18', 149: 'T20 ➔ T19 ➔ D16', 148: 'T20 ➔ T16 ➔ D20',
                147: 'T20 ➔ T17 ➔ D18', 146: 'T20 ➔ T18 ➔ D16', 145: 'T20 ➔ T15 ➔ D20', 144: 'T20 ➔ T20 ➔ D12',
                143: 'T20 ➔ T17 ➔ D16', 142: 'T20 ➔ T14 ➔ D20', 141: 'T20 ➔ T15 ➔ D18', 140: 'T20 ➔ T20 ➔ D10',
                139: 'T19 ➔ T14 ➔ D20', 138: 'T20 ➔ T18 ➔ D12', 137: 'T19 ➔ T16 ➔ D16', 136: 'T20 ➔ T20 ➔ D8',
                135: 'T20 ➔ T17 ➔ D12', 134: 'T20 ➔ T14 ➔ D16', 133: 'T20 ➔ T19 ➔ D8', 132: 'T20 ➔ T16 ➔ D12',
                131: 'T20 ➔ T13 ➔ D16', 130: 'T20 ➔ 20 ➔ Bull', 129: 'T19 ➔ T16 ➔ D12', 128: 'T18 ➔ T14 ➔ D16',
                127: 'T20 ➔ T17 ➔ D8', 126: 'T19 ➔ 19 ➔ Bull', 125: 'Bull ➔ T20 ➔ D7', 124: 'T20 ➔ T16 ➔ D8', 
                123: 'T19 ➔ T16 ➔ D9', 122: 'T18 ➔ 18 ➔ Bull', 121: 'T20 ➔ T11 ➔ D14', 120: 'T20 ➔ 20 ➔ D20',
                119: 'T19 ➔ T10 ➔ D16', 118: 'T20 ➔ 18 ➔ D20', 117: 'T20 ➔ 17 ➔ D20', 116: 'T20 ➔ 16 ➔ D20',
                115: 'T20 ➔ 15 ➔ D20', 114: 'T20 ➔ 14 ➔ D20', 113: 'T20 ➔ 13 ➔ D20', 112: 'T20 ➔ 12 ➔ D20',
                111: 'T20 ➔ 11 ➔ D20', 110: 'T20 ➔ 10 ➔ D20', 109: 'T19 ➔ 12 ➔ D20', 108: 'T20 ➔ 16 ➔ D16',
                107: 'T19 ➔ 10 ➔ D20', 106: 'T20 ➔ 10 ➔ D18', 105: 'T19 ➔ 16 ➔ D16', 104: 'T18 ➔ 10 ➔ D20',
                103: 'T19 ➔ 10 ➔ D18', 102: 'T20 ➔ 10 ➔ D16', 101: 'T17 ➔ 10 ➔ D20', 100: 'T20 ➔ D20',
                99: 'T19 ➔ 10 ➔ D16', 98: 'T20 ➔ D19', 97: 'T19 ➔ D20', 96: 'T20 ➔ D18',
                95: 'T19 ➔ D19', 94: 'T18 ➔ D20', 93: 'T19 ➔ D18', 92: 'T20 ➔ D16',
                91: 'T17 ➔ D20', 90: 'T18 ➔ D18', 89: 'T19 ➔ D16', 88: 'T16 ➔ D20',
                87: 'T17 ➔ D18', 86: 'T18 ➔ D16', 85: 'T15 ➔ D20', 84: 'T20 ➔ D12',
                83: 'T17 ➔ D16', 82: 'T14 ➔ D20', 81: 'T15 ➔ D18', 80: 'T20 ➔ D10',
                79: 'T13 ➔ D20', 78: 'T18 ➔ D12', 77: 'T15 ➔ D16', 76: 'T20 ➔ D8',
                75: 'T17 ➔ D12', 74: 'T14 ➔ D16', 73: 'T19 ➔ D8', 72: 'T16 ➔ D12',
                71: 'T13 ➔ D16', 70: 'T18 ➔ D8', 69: 'T15 ➔ D12', 68: 'T20 ➔ D4',
                67: 'T17 ➔ D8', 66: 'T10 ➔ D18', 65: 'T11 ➔ D16', 64: 'T16 ➔ D8',
                63: 'T13 ➔ D12', 62: 'T10 ➔ D16', 61: 'T15 ➔ D8', 60: '20 ➔ D20',
                59: '19 ➔ D20', 58: '18 ➔ D20', 57: '17 ➔ D20', 56: '16 ➔ D20',
                55: '15 ➔ D20', 54: '14 ➔ D20', 53: '13 ➔ D20', 52: '12 ➔ D20',
                51: '11 ➔ D20', 50: '10 ➔ D20', 49: '9 ➔ D20', 48: '16 ➔ D16',
                47: '15 ➔ D16', 46: '14 ➔ D16', 45: '13 ➔ D16', 44: '12 ➔ D16',
                43: '11 ➔ D16', 42: '10 ➔ D16', 41: '9 ➔ D16'
            };
            return standardCheckouts[score] || null;
        };

        const getLeagueStandings = () => {
            const standings = {};
            state.players.forEach(p => standings[p.id] = { player: p, played: 0, wins: 0, points: 0 });
            state.leagueMatches.forEach(m => {
                if (m.winner) {
                    standings[m.player1.id].played++;
                    if (m.player2) standings[m.player2.id].played++;
                    standings[m.winner.id].wins++;
                    standings[m.winner.id].points += 2; 
                }
            });
            return Object.values(standings).sort((a, b) => b.points !== a.points ? b.points - a.points : b.wins - a.wins);
        };

        // ==========================================
        // 4. EVENTS & ACTIONS
        // ==========================================
        window.setAppMode = (m) => setState({appMode: m});
        window.setGameMode = (m) => setState({gameMode: m});
        window.setOutMode = (m) => setState({outMode: m});
        window.setMatchFormat = (m) => setState({matchFormat: m});
        window.setTargetLegs = (v) => setState({targetLegs: Math.max(1, v)});
        window.setTargetSets = (v) => setState({targetSets: Math.max(1, v)});
        window.toggleFormatMenu = () => setState({isFormatExpanded: !state.isFormatExpanded});
        window.setInputMultiplier = (m) => setState({inputMultiplier: m});
        window.setView = (v) => setState({view: v});
        window.setTurnNotification = (n) => setState({turnNotification: n});
        
        window.changeBoardZoom = (delta) => {
            const newZoom = Math.max(1, Math.min(3, state.boardZoom + delta));
            setState({ boardZoom: newZoom });
        };

        window.addPlayer = () => {
            const input = document.getElementById('newPlayerInput');
            if (input && input.value.trim() !== '') {
                const newPlayers = [...state.players, { id: crypto.randomUUID(), name: input.value.trim() }];
                input.value = ''; 
                setState({ players: newPlayers, errorMsg: '' });
            }
        };

        window.removePlayer = (id) => {
            setState({ players: state.players.filter(p => p.id !== id) });
        };

        window.handlePlayerInputKey = (e) => {
            if (e.key === 'Enter') window.addPlayer();
        };

        const resetWizardStates = () => ({
            starterMode: 'SELECT', isCoinFlipping: false, coinWinner: null,
            bullOff: { order: [], currentTurn: 0, hits: {}, winner: null, isTie: false },
            boardZoom: 1
        });

        window.resetApp = () => {
            setState({ view: 'SETUP', rounds: [], leagueMatches: [], activeGame: null, currentDarts: [], inputMultiplier: 1, turnNotification: null, ...resetWizardStates() });
        };

        const generateBracketRound = (participants) => {
            const newMatches = [];
            for (let i = 0; i < participants.length; i += 2) {
                if (participants[i + 1]) {
                    newMatches.push({ id: crypto.randomUUID(), player1: participants[i], player2: participants[i + 1], winner: null, score1: 0, score2: 0 });
                } else {
                    newMatches.push({ id: crypto.randomUUID(), player1: participants[i], player2: null, winner: participants[i], score1: state.matchFormat === 'SETS' ? state.targetSets : state.targetLegs, score2: 0 });
                }
            }
            return newMatches;
        };

        window.startApp = () => {
            if (state.appMode === 'STANDARD' && state.players.length !== 2) { setState({errorMsg: 'Für ein Einzelspiel werden genau 2 Spieler benötigt.'}); return; }
            if (state.appMode === 'TOURNAMENT' && state.players.length < 2) { setState({errorMsg: 'Für ein Turnier werden mindestens 2 Spieler benötigt.'}); return; }
            if (state.appMode === 'LEAGUE' && state.players.length < 2) { setState({errorMsg: 'Für eine Liga werden mindestens 2 Spieler benötigt.'}); return; }
            
            let updates = { errorMsg: '', turnNotification: null, ...resetWizardStates() };

            if (state.appMode === 'TOURNAMENT') {
                const shuffled = [...state.players].sort(() => Math.random() - 0.5);
                updates.rounds = [generateBracketRound(shuffled)];
                updates.currentRoundIndex = 0;
                updates.view = 'BRACKET';
            } else if (state.appMode === 'LEAGUE') {
                const matches = [];
                for (let i = 0; i < state.players.length; i++) {
                    for (let j = i + 1; j < state.players.length; j++) {
                        matches.push({ id: crypto.randomUUID(), player1: state.players[i], player2: state.players[j], winner: null, score1: 0, score2: 0 });
                    }
                }
                updates.leagueMatches = matches.sort(() => Math.random() - 0.5);
                updates.view = 'LEAGUE_HUB';
            } else {
                const matchPlayers = state.players.map(p => ({ ...p, score: state.gameMode, history: [], legsWon: 0, setsWon: 0, stats: getDefaultStats() }));
                updates.activeGame = { mode: 'STANDARD', matchId: 'standard', matchFormat: state.matchFormat, targetLegs: state.targetLegs, targetSets: state.targetSets, players: matchPlayers, currentPlayerIndex: 0, startingPlayerIndex: 0 };
                updates.view = 'DECIDE_STARTER';
            }
            setState(updates);
        };

        window.startMatchById = (matchId, mode) => {
            let match;
            if (mode === 'TOURNAMENT') match = state.rounds[state.currentRoundIndex].find(m => m.id === matchId);
            else match = state.leagueMatches.find(m => m.id === matchId);
            
            if (!match || match.winner) return;

            setState({
                activeGame: {
                    mode: mode, matchId: match.id, matchFormat: state.matchFormat, targetLegs: state.targetLegs, targetSets: state.targetSets,
                    players: [
                        { ...match.player1, score: state.gameMode, history: [], legsWon: 0, setsWon: 0, stats: getDefaultStats() },
                        { ...match.player2, score: state.gameMode, history: [], legsWon: 0, setsWon: 0, stats: getDefaultStats() }
                    ],
                    currentPlayerIndex: 0, startingPlayerIndex: 0
                },
                currentDarts: [], inputMultiplier: 1, turnNotification: null, view: 'DECIDE_STARTER', ...resetWizardStates()
            });
        };

        window.advanceTournamentRound = () => {
            const currentRound = state.rounds[state.currentRoundIndex];
            const winners = currentRound.map(m => m.winner).filter(Boolean);
            if (winners.length === 1) return;
            const newRounds = [...state.rounds, generateBracketRound(winners)];
            setState({ rounds: newRounds, currentRoundIndex: state.currentRoundIndex + 1 });
        };

        // --- Starter Wizard ---
        window.startWithPlayer = (index) => {
            setState({
                activeGame: { ...state.activeGame, startingPlayerIndex: index, currentPlayerIndex: index },
                view: 'MATCH'
            });
        };

        window.handleCoinTossInit = () => {
            setState({ starterMode: 'COIN_TOSS', isCoinFlipping: true, coinWinner: null });
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * state.activeGame.players.length);
                setState({ coinWinner: randomIndex, isCoinFlipping: false });
            }, 1500);
        };

        window.handleBullOffInit = () => {
            const order = state.activeGame.players.map((_, i) => i).sort(() => Math.random() - 0.5);
            setState({ bullOff: { order, currentTurn: 0, hits: {}, winner: null, isTie: false }, starterMode: 'BULL_OFF', boardZoom: 1 });
        };

        window.handleDartboardClick = (event) => {
            const { bullOff, activeGame } = state;
            if (bullOff.winner !== null || bullOff.isTie || !activeGame) return;
            
            const clientX = event.clientX;
            const clientY = event.clientY;
            if (clientX === undefined || clientY === undefined) return;

            const rect = event.currentTarget.getBoundingClientRect();
            const xPct = ((clientX - rect.left) / rect.width) * 100;
            const yPct = ((clientY - rect.top) / rect.height) * 100;
            const distance = Math.sqrt(Math.pow(xPct - 50, 2) + Math.pow(yPct - 50, 2));

            const isWall = distance > 48;

            const currentThrowerIdx = bullOff.order[bullOff.currentTurn];
            const newHits = { ...bullOff.hits, [currentThrowerIdx]: { xPct, yPct, distance, isWall } };

            let updates = { hits: newHits };

            if (bullOff.currentTurn < bullOff.order.length - 1) {
                updates.currentTurn = bullOff.currentTurn + 1;
            } else {
                let minDistance = Infinity;
                let winnerIdx = null;
                let isTie = false;
                for (const [idxStr, hit] of Object.entries(newHits)) {
                    const idx = parseInt(idxStr);
                    if (hit.distance < minDistance) { minDistance = hit.distance; winnerIdx = idx; isTie = false; } 
                    else if (Math.abs(hit.distance - minDistance) < 1) { isTie = true; }
                }
                updates.isTie = isTie;
                updates.winner = isTie ? null : winnerIdx;
            }
            setState({ bullOff: { ...bullOff, ...updates } });
        };

        // --- In-Game ---
        window.handleAddDart = (base, fixedMultiplier) => {
            if (state.currentDarts.length >= 3) return;

            const mult = fixedMultiplier || state.inputMultiplier;
            const newDart = { base, multiplier: mult };

            state.currentDarts.push(newDart);
            state.inputMultiplier = 1;

            const activeGame = state.activeGame;
            const currentPlayer = activeGame.players[activeGame.currentPlayerIndex];
            
            let tempScore = currentPlayer.score;
            let isBust = false;
            let isWin = false;

            for (let i = 0; i < state.currentDarts.length; i++) {
                const d = state.currentDarts[i];
                tempScore -= (d.base * d.multiplier);

                if (tempScore < 0 || (tempScore === 1 && state.outMode === 'Double') || (tempScore === 0 && state.outMode === 'Double' && d.multiplier !== 2)) {
                    isBust = true; 
                    break;
                }
                if (tempScore === 0) { 
                    isWin = true; 
                    break; 
                }
            }

            if (isBust || isWin || state.currentDarts.length === 3) {
                setState({ currentDarts: state.currentDarts }); 
                
                if (isBust || isWin) {
                    processTurn();
                } else {
                    setTimeout(() => {
                        processTurn();
                    }, 600);
                }
            } else {
                setState({ currentDarts: state.currentDarts });
            }
        };

        window.handleUndoDart = () => {
            setState({ currentDarts: state.currentDarts.slice(0, -1) });
        };

        const processTurn = () => {
            if (!state.activeGame || state.currentDarts.length === 0) return;

            const activeGame = state.activeGame;
            const currentPlayer = activeGame.players[activeGame.currentPlayerIndex];
            const playerToUpdate = JSON.parse(JSON.stringify(currentPlayer)); 

            let tempScore = playerToUpdate.score;
            let isBust = false;
            let validDartsThrown = 0;
            let attemptsInTurn = 0;
            let checkoutsInTurn = 0;

            for (let i = 0; i < state.currentDarts.length; i++) {
                const dart = state.currentDarts[i];
                const dartScore = dart.base * dart.multiplier;

                if (state.outMode === 'Double' && ((tempScore <= 40 && tempScore % 2 === 0) || tempScore === 50)) attemptsInTurn += 1;
                else if (state.outMode === 'Single' && tempScore <= 60 && (tempScore <= 20 || tempScore === 25 || tempScore === 50 || tempScore % 2 === 0 || tempScore % 3 === 0)) attemptsInTurn += 1;

                tempScore -= dartScore;
                validDartsThrown += 1;

                if (tempScore < 0 || (tempScore === 1 && state.outMode === 'Double') || (tempScore === 0 && state.outMode === 'Double' && dart.multiplier !== 2)) {
                    isBust = true; break; 
                }
                if (tempScore === 0) { checkoutsInTurn += 1; break; }
            }

            const appliedDarts = state.currentDarts.slice(0, validDartsThrown); 
            const legDartsBeforeTurn = playerToUpdate.history.reduce((acc, t) => acc + t.length, 0);

            playerToUpdate.stats.checkoutAttempts += attemptsInTurn;
            playerToUpdate.stats.checkouts += checkoutsInTurn;
            const roundTotal = appliedDarts.reduce((acc, d) => acc + (d.base * d.multiplier), 0);

            let newTurnNotification = null;

            if (isBust) {
                playerToUpdate.stats.totalDarts += 3;
                const first9DartsInTurn = Math.max(0, Math.min(3, 9 - legDartsBeforeTurn));
                playerToUpdate.stats.first9Darts += first9DartsInTurn;
                
                const paddedDarts = [...appliedDarts];
                while (paddedDarts.length < 3) paddedDarts.push({ base: 0, multiplier: 1 });
                playerToUpdate.history.push(paddedDarts);
                
                newTurnNotification = { type: 'BUST', playerName: playerToUpdate.name };
                playSound('BUST');
            } else {
                playerToUpdate.stats.totalDarts += validDartsThrown;
                playerToUpdate.score = tempScore;
                playerToUpdate.stats.totalScore += roundTotal;
                
                for (let i = 0; i < validDartsThrown; i++) {
                    if (legDartsBeforeTurn + i < 9) {
                        playerToUpdate.stats.first9Score += (appliedDarts[i].base * appliedDarts[i].multiplier);
                        playerToUpdate.stats.first9Darts += 1;
                    }
                }
                playerToUpdate.history.push(appliedDarts);
                
                if (roundTotal === 180 && validDartsThrown === 3) { newTurnNotification = { type: '180', playerName: playerToUpdate.name }; playSound('180'); }
            }

            const updatedPlayers = [...activeGame.players];
            updatedPlayers[activeGame.currentPlayerIndex] = playerToUpdate;

            if (tempScore === 0 && !isBust) {
                playerToUpdate.legsWon += 1;
                let matchWon = false;
                let setWon = false;

                if (activeGame.matchFormat === 'SETS') {
                    if (playerToUpdate.legsWon >= activeGame.targetLegs) {
                        playerToUpdate.setsWon += 1;
                        setWon = true;
                        updatedPlayers.forEach(p => p.legsWon = 0);
                        if (playerToUpdate.setsWon >= activeGame.targetSets) matchWon = true;
                    }
                } else {
                    if (playerToUpdate.legsWon >= activeGame.targetLegs) matchWon = true;
                }

                if (matchWon) {
                    const p1Score = activeGame.matchFormat === 'SETS' ? updatedPlayers[0].setsWon : updatedPlayers[0].legsWon;
                    const p2Score = activeGame.players.length > 1 ? (activeGame.matchFormat === 'SETS' ? updatedPlayers[1].setsWon : updatedPlayers[1].legsWon) : 0;
                    
                    let updates = { activeGame: { ...activeGame, players: updatedPlayers }, view: 'MATCH_STATS', currentDarts: [], inputMultiplier: 1 };

                    if (activeGame.mode === 'TOURNAMENT') {
                        const updatedRounds = JSON.parse(JSON.stringify(state.rounds));
                        const matchIndex = updatedRounds[state.currentRoundIndex].findIndex(m => m.id === activeGame.matchId);
                        updatedRounds[state.currentRoundIndex][matchIndex] = { ...updatedRounds[state.currentRoundIndex][matchIndex], winner: playerToUpdate, score1: p1Score, score2: p2Score };
                        updates.rounds = updatedRounds;
                    } else if (activeGame.mode === 'LEAGUE') {
                        const updatedLeague = JSON.parse(JSON.stringify(state.leagueMatches));
                        const matchIndex = updatedLeague.findIndex(m => m.id === activeGame.matchId);
                        updatedLeague[matchIndex] = { ...updatedLeague[matchIndex], winner: playerToUpdate, score1: p1Score, score2: p2Score };
                        updates.leagueMatches = updatedLeague;
                    }
                    setState(updates);
                } else {
                    updatedPlayers.forEach(p => { p.score = state.gameMode; p.history = []; });
                    const nextStarter = (activeGame.startingPlayerIndex + 1) % activeGame.players.length;
                    setState({ 
                        activeGame: { ...activeGame, players: updatedPlayers, startingPlayerIndex: nextStarter, currentPlayerIndex: nextStarter },
                        turnNotification: { type: setWon ? 'SET_WON' : 'LEG_WON', playerName: playerToUpdate.name },
                        currentDarts: [], inputMultiplier: 1
                    });
                }
                return;
            }

            setState({ 
                activeGame: { ...activeGame, players: updatedPlayers, currentPlayerIndex: (activeGame.currentPlayerIndex + 1) % activeGame.players.length },
                currentDarts: [], inputMultiplier: 1, turnNotification: newTurnNotification
            });
        };

            if (!state.activeGame) return;
            if (state.activeGame.mode === 'TOURNAMENT') setState({view: 'BRACKET'});
            else if (state.activeGame.mode === 'LEAGUE') setState({view: 'LEAGUE_HUB'});

            } else if (state.starterMode === 'COIN_TOSS') {
                html += `
                  <div class="flex flex-col items-center py-4">

                     </div>
                     <div class="transition-opacity duration-500 w-full ${state.coinWinner !== null ? 'opacity-100' : 'opacity-0'}">

                                  <rect width="100" height="100" fill="#000000" />

                                        <path d="${getWedgePath(38)}" fill="${i%2 === 0 ? '#171717' : '#fdf5e6'}" />
                                        <path d="${getWedgePath(26)}" fill="${i%2 === 0 ? '#e11d48' : '#84cc16'}" />

                      ` : ''}
                    </div>
                </div>`;

            html += `</div></div>`;
            return html;

                        <tr class="text-slate-500 text-xs uppercase tracking-widest border-b border-slate-800 bg-slate-900/50">

                          const first9 = p.stats.first9Darts > 0 ? ((p.stats.first9Score / p.stats.first9Darts) * 3).toFixed(1) : '0.0';
                          const co = `${p.stats.checkouts} / ${p.stats.checkoutAttempts}`;

                            </tr>

                  <button onclick="handleStatsContinue()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 flex items-center justify-center rounded-2xl font-bold text-base active:scale-95 transition-all">

                  </button>
                </div>
              </div>
            </div>
            `;

                    </div>

                    <div class="grid grid-cols-5 gap-2 lg:gap-3 mb-4 lg:mb-6">
                      ${Array.from({length: 20}, (_, i) => i + 1).map(num => `
                        <button onclick="handleAddDart(${num})" ${state.currentDarts.length >= 3 ? 'disabled' : ''} class="bg-slate-800 hover:bg-slate-700 flex items-center justify-center disabled:opacity-50 py-4 lg:py-6 rounded-2xl font-bold text-lg sm:text-xl lg:text-2xl transition-all active:scale-95 text-slate-200">${num}</button>
                      `).join('')}
                    </div>

                    <div class="grid grid-cols-4 gap-2 lg:gap-3">
                      <button onclick="handleAddDart(0, 1)" ${state.currentDarts.length >= 3 ? 'disabled' : ''} class="bg-slate-800 hover:bg-slate-700 flex items-center justify-center py-4 rounded-2xl font-semibold text-xs lg:text-sm disabled:opacity-50 transition-transform active:scale-95 text-slate-400">Vorbei</button>
                      <button onclick="handleAddDart(25, 1)" ${state.currentDarts.length >= 3 ? 'disabled' : ''} class="bg-emerald-900/30 hover:bg-emerald-900/50 flex items-center justify-center py-4 rounded-2xl font-semibold text-xs lg:text-sm disabled:opacity-50 transition-transform active:scale-95 text-emerald-400">Bull</button>
                      <button onclick="handleAddDart(25, 2)" ${state.currentDarts.length >= 3 ? 'disabled' : ''} class="bg-rose-900/30 hover:bg-rose-900/50 flex items-center justify-center py-4 rounded-2xl font-semibold text-xs lg:text-sm disabled:opacity-50 transition-transform active:scale-95 text-rose-400">D-Bull</button>
                      <button onclick="handleUndoDart()" ${state.currentDarts.length === 0 ? 'disabled' : ''} class="bg-slate-800 hover:bg-slate-700 flex items-center justify-center py-4 rounded-2xl font-semibold text-xs lg:text-sm disabled:opacity-50 transition-transform active:scale-95 text-slate-300">⌫ Rückgängig</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>`;
            return html;
        }

        // Start App
        initApp();
    </script>
</body>
</html>
